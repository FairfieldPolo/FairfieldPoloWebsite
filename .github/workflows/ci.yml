name: CI

# Static generation imports `@/lib/sanity` (e.g. via Footer). Set repository Variables
# NEXT_PUBLIC_SANITY_PROJECT_ID and NEXT_PUBLIC_SANITY_DATASET (same as Vercel / .env.local).
# Optional: Secrets → SANITY_API_READ_TOKEN if the dataset requires a token.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Sanity configuration
        run: |
          if [ -z "${NEXT_PUBLIC_SANITY_PROJECT_ID:-}" ] || [ -z "${NEXT_PUBLIC_SANITY_DATASET:-}" ]; then
            echo "::error::Set GitHub Actions Variables NEXT_PUBLIC_SANITY_PROJECT_ID and NEXT_PUBLIC_SANITY_DATASET: Repository → Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run type-check --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: build.log
